<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ALGEBRA-FLIX</title>
    <style>
        :root {
            --bg: #030305;
            --liquid-bg: rgba(20, 20, 20, 0.7);
            --accent-purple: #8834ec;
            --accent-green: #20e3b2;
            --text-main: #fff;
            --border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(30px);
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body { margin: 0; background: var(--bg); color: var(--text-main); overflow-x: hidden; }

        .brand {
            position: fixed; top: 25px; left: 30px; z-index: 1100;
            font-size: 26px; font-weight: 900;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .nav-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 65%; max-width: 950px; }
        .pill-nav {
            background: var(--liquid-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--border);
            border-radius: 50px; display: flex; align-items: center; justify-content: space-between;
            padding: 8px 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .nav-links { display: flex; gap: 5px; }
        .nav-item { cursor: pointer; font-weight: 600; font-size: 13px; opacity: 0.6; padding: 10px 18px; border-radius: 20px; transition: 0.3s; color: white; }
        .nav-item.active { opacity: 1; background: rgba(255,255,255,0.1); color: #fff; }

        .main-content { padding: 120px 4% 50px; }
        .section-title { font-size: 24px; font-weight: 800; margin: 30px 0 20px; display: flex; align-items: center; justify-content: space-between; }
        .full-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        
        .card {
            aspect-ratio: 2/3; border-radius: 12px; background-size: cover; background-position: center;
            position: relative; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid rgba(255,255,255,0.05); overflow: hidden;
        }
        .card:hover { transform: scale(1.05); border-color: var(--accent-purple); z-index: 10; }

        #details-overlay { position: fixed; inset: 0; z-index: 2000; background: #000; display: none; overflow-y: auto; }
        .details-backdrop { position: absolute; top: 0; width: 100%; height: 100vh; background-size: cover; background-position: top center; opacity: 0.5; mask-image: linear-gradient(to bottom, black 20%, transparent 90%); }
        .details-content { position: relative; z-index: 2100; padding: 100px 5%; max-width: 1400px; margin: 0 auto; }
        
        .meta-tag { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .star { color: #ffc107; font-size: 18px; }

        .play-btn { background: var(--accent-purple); color: white; border: none; padding: 15px 40px; border-radius: 40px; font-size: 18px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }

        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 30px; }
        .ep-card { background: rgba(255,255,255,0.05); border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); transition: 0.3s; }
        .ep-card:hover { border-color: var(--accent-purple); background: rgba(255,255,255,0.1); }
        .ep-thumb { width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; }
        .ep-info { padding: 15px; }
        .ep-title { font-weight: 700; color: var(--accent-green); margin-bottom: 5px; }
        .ep-desc { font-size: 13px; opacity: 0.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        #player-view { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; padding: 20px; }
        iframe { width: 100%; height: calc(100% - 80px); border: none; border-radius: 15px; }

        .btn-back { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; }
        .btn-clear { background: #ff4444; color: white; border: none; padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: bold; }
        select { background: #151515; color: white; border: 1px solid var(--border); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="brand">ALGEBRA-FLIX</div>

<div class="nav-container">
    <div class="pill-nav">
        <div class="nav-links">
            <div class="nav-item active" id="nav-home" onclick="setMode('home')">Home</div>
            <div class="nav-item" id="nav-movie" onclick="setMode('movie')">Movies</div>
            <div class="nav-item" id="nav-tv" onclick="setMode('tv')">TV Shows</div>
            <div class="nav-item" id="nav-anime" onclick="setMode('anime')">Anime</div>
        </div>
        <input type="text" id="search-box" placeholder="Search..." style="background:transparent; border:none; color:white; outline:none; width:150px;">
    </div>
</div>

<div class="main-content">
    <div id="history-section" style="display:none; margin-bottom:50px;">
        <h2 class="section-title">
            Continue Watching
            <button class="btn-clear" onclick="clearHistory()">Clear All</button>
        </h2>
        <div id="history-grid" class="full-grid"></div>
    </div>
    <h2 class="section-title" id="grid-header">Trending Now</h2>
    <div id="main-grid" class="full-grid"></div>
</div>

<div id="details-overlay">
    <div class="details-backdrop" id="d-backdrop"></div>
    <div class="details-content">
        <button class="btn-back" onclick="closeDetails()">← Back</button>
        <div style="display:flex; gap:50px; flex-wrap: wrap; align-items: flex-end;">
            <div id="d-poster" style="width:300px; aspect-ratio:2/3; border-radius:20px; background-size:cover; box-shadow: 0 20px 50px rgba(0,0,0,0.5);"></div>
            <div style="flex:1; min-width:350px;">
                <h1 id="d-title" style="font-size:64px; margin:0 0 10px 0; font-weight:900;"></h1>
                <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                    <span class="star">★ <span id="d-rating" style="color:white"></span></span>
                    <span id="d-year" class="meta-tag"></span>
                    <div id="d-genres" style="display:flex; gap:8px;"></div>
                </div>
                <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 30px;">
                    <h3 style="margin-top:0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-purple);">Overview</h3>
                    <p id="d-overview" style="font-size:17px; line-height:1.6; opacity:0.8; margin:0;"></p>
                </div>
                <button class="play-btn" id="play-main">▶ Play Now</button>
            </div>
        </div>
        <div id="tv-area" style="display:none; margin-top:60px;">
            <h2 class="section-title">Episodes</h2>
            <div id="season-tabs" style="display:flex; gap:10px; margin-bottom:25px; overflow-x:auto;"></div>
            <div id="ep-list" class="ep-grid"></div>
        </div>
    </div>
</div>

<div id="player-view">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <button class="btn-back" style="margin:0" onclick="closePlayer()">← Exit Player</button>
        <select id="server-select" onchange="loadPlayer()"></select>
    </div>
    <iframe id="player-frame" allowfullscreen></iframe>
</div>

<script>
    const KEY = "2713804610e1e236b1cf44bfac3a7776";
    let current = null, mode = 'home';

    const BANNED_WORDS = [
        'porn', 'hentai', 'pornhub', 'overflow', 'tits', 'boobs', 'horny', 'blue movie', 
        'porno', 'high school on sex', 'sex with love', 'sex dainamaito', 
        'madonna no shizuku', 'sexual chronicles of a french family', 
        'adult porn', 'p0rn', 'playboy'
    ];

    const SOURCES = [
        { name: "VidEasy (4K)", url: "https://player.videasy.net/{t}/{id}{sh_ve}?color=8834ec" },
        { name: "VidFast (4K)", url: "https://vidfast.pro/{t}/{id}{sh}" },
        { name: "VidRock.net", url: "https://vidrock.net/embed/{t}/{id}{sh}" },
        { name: "VidSrc (VSEmbed)", url: "https://vsembed.ru/embed/{t}/{id}/{sh_v}" },
        { name: "AutoEmbed", url: "https://player.autoembed.cc/embed/{t}/{id}{sh}" },
        { name: "Vidsrc.me", url: "https://vidsrc.me/embed/{t}?tmdb={id}{sh_me}" },
        { name: "Vidsrc.to", url: "https://vidsrc.to/embed/{t}/{id}{sh}" },
        { name: "Vidsrc.rip", url: "https://vidsrc.rip/embed/{t}/{id}{sh}" },
        { name: "Vidsrc.su", url: "https://vidsrc.su/embed/{t}/{id}{sh}" },
        { name: "Vidsrc.xyz", url: "https://vidsrc.xyz/embed/{t}/{id}{sh}" },
        { name: "Vidsrc.vip", url: "https://vidsrc.vip/embed/{t}/{id}{sh}" },
        { name: "Vidsrc.cc", url: "https://vidsrc.cc/v2/embed/{t}/{id}{sh}" },
        { name: "VidLink", url: "https://vidlink.pro/{t}/{id}{sh}" },
        { name: "Embed.su", url: "https://embed.su/embed/{t}/{id}{sh}" },
        { name: "MoviesAPI", url: "https://moviesapi.club/{t}/{id}{sh_ma}" },
        { name: "2Embed", url: "https://www.2embed.cc/embed{t_2}/{id}{sh_2}" },
        { name: "Smashy", url: "https://player.smashy.stream/{t}/{id}?s={s}&e={e}" },
        { name: "Hexa", url: "https://hexa.watch/watch/{t}/{id}{sh}" },
        { name: "P-Stream", url: "https://iframe.pstream.mov/media/tmdb-{t}-{id}{sh}" },
        { name: "MultiEmbed", url: "https://multiembed.mov/?video_id={id}&tmdb=1{sh_mu}" },
        { name: "Vidify", url: "https://vidify.top/embed/{t}/{id}{sh}" },
        { name: "Flicky", url: "https://flicky.host/embed/{t}/?id={id}{sh}" },
        { name: "RiveStream", url: "https://rivestream.org/embed?type={t}&id={id}{sh_rs}" },
        { name: "Vidora", url: "https://vidora.su/{t}/{id}{sh}" },
        { name: "StreamFlix", url: "https://watch.streamflix.one/{t}/{id}/watch" },
        { name: "Nebula", url: "https://nebulaflix.stream/{t}?mt={id}" },
        { name: "VidJoy", url: "https://vidjoy.pro/embed/{t}/{id}{sh}" },
        { name: "VidZee", url: "https://player.vidzee.wtf/embed/{t}/{id}{sh}" },
        { name: "Spenflix", url: "https://spencerdevs.xyz/{t}/{id}{sh}" },
        { name: "123Embed", url: "https://play2.123embed.net/{t}/{id}{sh}" },
        { name: "UEmbed", url: "https://uembed.site/?id={id}{sh_ue}" }
    ];

    function init() {
        const sel = document.getElementById('server-select');
        SOURCES.forEach((s, i) => {
            let opt = document.createElement('option');
            opt.value = i; opt.innerText = s.name;
            sel.appendChild(opt);
        });
        updateHistory();
        loadPage();
    }

    async function setMode(m) {
        mode = m;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`nav-${m}`).classList.add('active');
        loadPage();
    }

    async function loadPage() {
        let u = `https://api.themoviedb.org/3/trending/all/week?api_key=${KEY}&include_adult=false`;
        if(mode === 'movie') u = `https://api.themoviedb.org/3/movie/popular?api_key=${KEY}&include_adult=false`;
        if(mode === 'tv') u = `https://api.themoviedb.org/3/tv/popular?api_key=${KEY}&include_adult=false`;
        if(mode === 'anime') u = `https://api.themoviedb.org/3/discover/tv?api_key=${KEY}&with_genres=16&include_adult=false`;
        const d = await fetch(u).then(r => r.json());
        renderGrid(d.results, 'main-grid');
    }

    function renderGrid(items, targetId) {
        const t = document.getElementById(targetId); t.innerHTML = '';
        if(!items) return;
        items.forEach(item => {
            const title = (item.title || item.name || '').toLowerCase();
            
            // Check for blocked words in titles
            if (BANNED_WORDS.some(w => title.includes(w))) {
                return; // Skip rendering
            }

            if(!item.poster_path) return;
            const c = document.createElement('div'); c.className = 'card';
            c.style.backgroundImage = `url(https://image.tmdb.org/t/p/w500${item.poster_path})`;
            const type = item.t || (item.name || item.first_air_date || item.media_type === 'tv' ? 'tv' : 'movie');
            c.onclick = () => openDetails({...item, type});
            t.appendChild(c);
        });
    }

    async function openDetails(item) {
        const type = item.type;
        const data = await fetch(`https://api.themoviedb.org/3/${type}/${item.id}?api_key=${KEY}`).then(r => r.json());
        
        // Final verification check
        const finalTitle = (data.title || data.name || '').toLowerCase();
        if (BANNED_WORDS.some(w => finalTitle.includes(w))) {
             return; // Just do nothing
        }

        document.getElementById('details-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('d-backdrop').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;
        document.getElementById('d-poster').style.backgroundImage = `url(https://image.tmdb.org/t/p/w500${data.poster_path})`;
        document.getElementById('d-title').innerText = data.title || data.name;
        document.getElementById('d-overview').innerText = data.overview;
        document.getElementById('d-rating').innerText = data.vote_average.toFixed(1);
        document.getElementById('d-year').innerText = (data.release_date || data.first_air_date || '').split('-')[0];
        
        const gDiv = document.getElementById('d-genres'); gDiv.innerHTML = '';
        data.genres.slice(0,3).forEach(g => { gDiv.innerHTML += `<span class="meta-tag">${g.name}</span>`; });

        const pBtn = document.getElementById('play-main');
        if(type === 'movie') {
            pBtn.style.display = 'flex';
            pBtn.onclick = () => startPlayer('movie', data.id, 1, 1, data.title, data.poster_path);
            document.getElementById('tv-area').style.display = 'none';
        } else {
            pBtn.style.display = 'none';
            document.getElementById('tv-area').style.display = 'block';
            loadSeasons(data);
        }
    }

    function loadSeasons(data) {
        const tabs = document.getElementById('season-tabs'); tabs.innerHTML = '';
        data.seasons.filter(s => s.season_number > 0).forEach(s => {
            const b = document.createElement('button'); b.className = 'btn-back'; b.innerText = `Season ${s.season_number}`;
            b.onclick = () => loadEpisodes(data.id, s.season_number, data.name, data.poster_path);
            tabs.appendChild(b);
        });
        loadEpisodes(data.id, 1, data.name, data.poster_path);
    }

    async function loadEpisodes(id, s, title, poster) {
        const d = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s}?api_key=${KEY}`).then(r => r.json());
        const list = document.getElementById('ep-list'); list.innerHTML = '';
        d.episodes.forEach(e => {
            const thumb = e.still_path ? `https://image.tmdb.org/t/p/w500${e.still_path}` : `https://image.tmdb.org/t/p/w500${poster}`;
            const c = document.createElement('div'); c.className = 'ep-card';
            c.innerHTML = `<div class="ep-thumb" style="background-image: url(${thumb})"></div><div class="ep-info"><div class="ep-title">E${e.episode_number} • ${e.name}</div><div class="ep-desc">${e.overview || 'N/A'}</div></div>`;
            c.onclick = () => startPlayer('tv', id, s, e.episode_number, title, poster);
            list.appendChild(c);
        });
    }

    function startPlayer(t, id, s=1, e=1, title, poster) {
        current = { t, id, s, e, title, poster_path: poster };
        let history = JSON.parse(localStorage.getItem('alg_history') || '[]');
        history = history.filter(x => x.id !== id);
        history.unshift(current);
        localStorage.setItem('alg_history', JSON.stringify(history.slice(0, 10)));
        document.getElementById('player-view').style.display = 'block';
        loadPlayer();
    }

    function loadPlayer() {
        const srv = SOURCES[document.getElementById('server-select').value];
        const { t, id, s, e } = current;
        
        const sh = (t === 'tv') ? `/${s}/${e}` : '';
        const sh_ve = (t === 'tv') ? `/${s}/${e}` : '';
        const sh_v = (t === 'tv') ? `${s}/${e}` : '';
        const sh_me = (t === 'tv') ? `&s=${s}&e=${e}` : '';
        const sh_ma = (t === 'tv') ? `-s${s}-e${e}` : '';
        const sh_mu = (t === 'tv') ? `&s=${s}&e=${e}` : '';
        const sh_rs = (t === 'tv') ? `&s=${s}&e=${e}` : '';
        const sh_ue = (t === 'tv') ? `&s=${s}&e=${e}` : '';
        const t_2 = (t === 'tv') ? '/tv' : '';
        const sh_2 = (t === 'tv') ? `&s=${s}&e=${e}` : '';

        let url = srv.url
            .replace(/{t}/g, t).replace(/{id}/g, id).replace(/{s}/g, s).replace(/{e}/g, e)
            .replace('{sh}', sh).replace('{sh_ve}', sh_ve).replace('{sh_v}', sh_v)
            .replace('{sh_me}', sh_me).replace('{sh_ma}', sh_ma).replace('{sh_mu}', sh_mu)
            .replace('{sh_rs}', sh_rs).replace('{sh_ue}', sh_ue)
            .replace('{t_2}', t_2).replace('{sh_2}', sh_2);

        document.getElementById('player-frame').src = url;
    }

    function updateHistory() {
        const hist = JSON.parse(localStorage.getItem('alg_history') || '[]');
        const section = document.getElementById('history-section');
        if(hist.length > 0) { section.style.display = 'block'; renderGrid(hist, 'history-grid'); }
        else { section.style.display = 'none'; }
    }

    function clearHistory() {
        localStorage.removeItem('alg_history');
        updateHistory();
    }

    function closeDetails() { document.getElementById('details-overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function closePlayer() { document.getElementById('player-view').style.display = 'none'; document.getElementById('player-frame').src = ''; updateHistory(); }

    document.getElementById('search-box').onkeypress = async (e) => {
        if(e.key === 'Enter') {
            const query = e.target.value.toLowerCase().trim();
            if(!query) return;
            
            // Search level filtering
            if (BANNED_WORDS.some(word => query.includes(word))) {
                document.getElementById('main-grid').innerHTML = '<p style="padding: 20px; opacity: 0.5;">No results found.</p>';
                return;
            }

            const d = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&query=${query}&include_adult=false`).then(r => r.json());
            renderGrid(d.results, 'main-grid');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        }
    }
    init();
</script>
</body>
</html>
