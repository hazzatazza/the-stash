<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra Runner</title>
    <style>
        :root {
            --bg-dark: #0f0d12;
            --bg-panel: #1a171f;
            --accent-green: #2ecc71;
            --accent-purple: #a55eea;
            --text-main: #e0d9e5;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        /* Fancy Header */
        header { 
            padding: 15px 25px; 
            background: var(--bg-panel); 
            border-bottom: 1px solid rgba(165, 94, 234, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--accent-green);
            font-size: 1.1rem;
        }
        .logo span { color: var(--accent-purple); opacity: 0.8; }

        .controls { display: flex; gap: 10px; }

        button {
            background: var(--glass);
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button:hover {
            background: rgba(165, 94, 234, 0.1);
            border-color: var(--accent-purple);
            transform: translateY(-1px);
        }

        button.primary {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        button.primary:hover {
            background: var(--accent-green);
            color: var(--bg-dark);
        }
        
        /* Main Workspace */
        .container {
            display: flex;
            flex: 1;
            gap: 15px;
            padding: 15px;
            background: radial-gradient(circle at top right, #16121d, #0f0d12);
        }

        .panel-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .label {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.2);
            pointer-events: none;
        }

        textarea {
            flex: 1;
            background: var(--bg-panel);
            color: #b3a9c9;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            border: 1px solid rgba(165, 94, 234, 0.1);
            border-radius: 12px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        textarea:focus {
            border-color: var(--accent-purple);
        }

        iframe { 
            flex: 1;
            background: white; 
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* Pulse Indicator */
        #status {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            transition: 0.3s;
        }

        .typing #status {
            box-shadow: 0 0 10px var(--accent-green);
            transform: scale(1.2);
        }
    </style>
</head>
<body id="app">

<header>
    <div class="logo"><span id="status"></span>Code<span>Runner</span></div>
    <div class="controls">
        <button onclick="copyCode()" id="copyBtn">Copy Code</button>
        <button onclick="downloadCode()">Download .html</button>
        <button class="primary" onclick="goFullscreen()">Fullscreen View</button>
    </div>
</header>

<div class="container">
    <div class="panel-wrapper">
        <span class="label">Editor</span>
        <textarea id="code" spellcheck="false">
<div class="canvas">
  <div class="circle"></div>
  <h1>Interactive Lab</h1>
  <p>Your code updates in real-time.</p>
</div>

<style>
  body { 
    margin: 0; height: 100vh; display: grid; place-items: center;
    background: #111; color: #2ecc71; font-family: system-ui;
  }
  .canvas { text-align: center; }
  .circle {
    width: 60px; height: 60px; background: #a55eea;
    border-radius: 50%; margin: 0 auto 20px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }
</style></textarea>
    </div>

    <div class="panel-wrapper">
        <span class="label">Preview</span>
        <iframe id="output"></iframe>
    </div>
</div>

<script>
    const codeArea = document.getElementById('code');
    const outputFrame = document.getElementById('output');
    const app = document.getElementById('app');
    let typingTimer;

    function update() {
        const content = codeArea.value;
        const frameDoc = outputFrame.contentDocument || outputFrame.contentWindow.document;
        frameDoc.open();
        frameDoc.write(content);
        frameDoc.close();
        
        // Status indicator logic
        app.classList.add('typing');
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => app.classList.remove('typing'), 500);
    }

    function goFullscreen() {
        if (outputFrame.requestFullscreen) outputFrame.requestFullscreen();
        else if (outputFrame.webkitRequestFullscreen) outputFrame.webkitRequestFullscreen();
    }

    function copyCode() {
        navigator.clipboard.writeText(codeArea.value);
        const btn = document.getElementById('copyBtn');
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy Code", 2000);
    }

    function downloadCode() {
        const blob = new Blob([codeArea.value], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'my-creative-code.html';
        a.click();
    }

    codeArea.addEventListener('input', update);
    update(); // Initial load
</script>

</body>
</html>
