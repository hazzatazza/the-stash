<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra HTML Code Runner</title>
    <style>
        :root {
            --bg-dark: #0f0d12;
            --bg-panel: #1a171f;
            --accent-green: #2ecc71;
            --accent-purple: #a55eea;
            --text-main: #e0d9e5;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        header { 
            padding: 10px 20px; 
            background: var(--bg-panel); 
            border-bottom: 1px solid rgba(165, 94, 234, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo { font-weight: 800; color: var(--accent-green); font-size: 1rem; }
        .logo span { color: var(--accent-purple); }

        .controls { display: flex; gap: 8px; }

        button {
            background: var(--glass);
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover { border-color: var(--accent-purple); background: rgba(165, 94, 234, 0.1); }
        button.primary { border-color: var(--accent-green); color: var(--accent-green); }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            background: var(--bg-dark);
        }

        .panel-editor {
            width: 50%;
            min-width: 100px;
            display: flex;
            flex-direction: column;
            padding: 10px 0 10px 10px;
        }

        .panel-preview {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 10px 10px 0;
            min-width: 100px;
        }

        .resizer {
            width: 10px;
            cursor: col-resize;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .resizer::after {
            content: '';
            width: 2px;
            height: 30px;
            background: rgba(165, 94, 234, 0.2);
            border-radius: 2px;
        }

        textarea, iframe {
            flex: 1;
            border-radius: 8px;
            border: 1px solid rgba(165, 94, 234, 0.1);
        }

        textarea {
            background: var(--bg-panel);
            color: #b3a9c9;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            outline: none;
            resize: none;
        }

        iframe { background: #000; border: none; }
        .dragging iframe { pointer-events: none; }
    </style>
</head>
<body id="app">

<header>
    <div class="logo">Algebra<span>Runner</span></div>
    <div class="controls">
        <button onclick="copyCode()" id="copyBtn">Copy</button>
        <button onclick="downloadCode()">Download</button>
        <button class="primary" onclick="goFullscreen()">Fullscreen</button>
    </div>
</header>

<div class="container" id="mainContainer">
    <div class="panel-editor" id="editorSide">
        <textarea id="code" spellcheck="false"><!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: #0f0d12;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Arial Black', sans-serif;
    }

    h1 {
      font-size: 4rem;
      text-align: center;
      background: linear-gradient(to right, #2ecc71, #a55eea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 10px rgba(165, 94, 234, 0.3));
      animation: glow 3s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 10px rgba(46, 204, 113, 0.2)); }
      to { filter: drop-shadow(0 0 25px rgba(165, 94, 234, 0.6)); }
    }
  </style>
</head>
<body>
  <h1>ALGEBRA HTML<br>CODE RUNNER</h1>
</body>
</html></textarea>
    </div>

    <div class="resizer" id="dragBar"></div>

    <div class="panel-preview">
        <iframe id="output"></iframe>
    </div>
</div>

<script>
    const editorSide = document.getElementById('editorSide');
    const dragBar = document.getElementById('dragBar');
    const mainContainer = document.getElementById('mainContainer');
    const codeArea = document.getElementById('code');
    const outputFrame = document.getElementById('output');

    let isDragging = false;
    dragBar.addEventListener('mousedown', () => { isDragging = true; document.body.classList.add('dragging'); });
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        editorSide.style.width = (e.clientX - mainContainer.offsetLeft) + 'px';
    });
    document.addEventListener('mouseup', () => { isDragging = false; document.body.classList.remove('dragging'); });

    function update() {
        const frameDoc = outputFrame.contentDocument || outputFrame.contentWindow.document;
        frameDoc.open();
        frameDoc.write(codeArea.value);
        frameDoc.close();
    }

    function downloadCode() {
        const code = codeArea.value;
        const titleMatch = code.match(/<title>(.*?)<\/title>/i);
        let filename = (titleMatch && titleMatch[1]) ? titleMatch[1].trim() : "algebracode";
        filename = filename.replace(/[^a-z0-9 _-]/gi, '');
        const blob = new Blob([code], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${filename}.html`;
        a.click();
    }

    function copyCode() {
        navigator.clipboard.writeText(codeArea.value);
        document.getElementById('copyBtn').innerText = "Copied!";
        setTimeout(() => document.getElementById('copyBtn').innerText = "Copy", 2000);
    }

    function goFullscreen() {
        if (outputFrame.requestFullscreen) outputFrame.requestFullscreen();
        else if (outputFrame.webkitRequestFullscreen) outputFrame.webkitRequestFullscreen();
    }

    codeArea.addEventListener('input', update);
    update();
</script>
</body>
</html>
