<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Err List</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --radius: 12px;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text); 
            margin: 0; padding: 20px;
        }
        
        .container { width: 100%; max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; }
        
        .controls { text-align: center; margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { 
            background: #444; color: white; border: none; padding: 10px 20px; 
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #666; }
        button#reset-btn { background: #833; }
        button#reset-btn:hover { background: #a33; }

        /* Image Wrapper */
        .image-wrapper { 
            position: relative; 
            width: 80px; height: 80px; 
            margin: 5px; cursor: grab;
            user-select: none;
        }
        
        .image-wrapper img { 
            width: 100%; height: 100%; 
            object-fit: cover; border-radius: 8px;
            pointer-events: none;
        }

        .delete-btn {
            position: absolute; top: -8px; right: -8px;
            background: #ff4d4d; color: white; border: none;
            border-radius: 50%; width: 22px; height: 22px;
            display: none; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; cursor: pointer;
            z-index: 10;
        }
        .image-wrapper:hover .delete-btn { display: flex; }

        /* Tier Styles */
        #tier-list-container { background: #1e1e1e; padding: 10px; border-radius: var(--radius); }
        .tier-row { display: flex; margin-bottom: 5px; min-height: 95px; }
        .label { 
            width: 80px; display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 18px; color: rgba(0,0,0,0.7);
            border-radius: 8px 0 0 8px; padding: 5px; text-align: center;
        }
        .drop-zone { 
            flex-grow: 1; display: flex; flex-wrap: wrap; padding: 5px; 
            background: rgba(255,255,255,0.05); min-height: 90px;
            border-radius: 0 8px 8px 0; transition: background 0.2s;
        }
        .drop-zone.drag-over { background: rgba(255,255,255,0.15); }
        
        #holding-area { 
            border: 2px dashed #444; border-radius: var(--radius);
            min-height: 100px; padding: 10px; margin-top: 20px;
            display: flex; flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tea Err List</h1>
        
        <div class="controls">
            <input type="file" id="imageInput" multiple accept="image/*" style="display:none">
            <button onclick="document.getElementById('imageInput').click()">Upload</button>
            <button onclick="addTier()">Add Tier</button>
            <button id="reset-btn" onclick="resetBoard()">Reset Board</button>
            <button id="saveBtn">Save PNG</button>
        </div>

        <div id="tier-list-container">
            <div class="tier-row"><div class="label" style="background:#ff7f7f">S</div><div class="drop-zone"></div></div>
            <div class="tier-row"><div class="label" style="background:#ffbf7f">A</div><div class="drop-zone"></div></div>
            <div class="tier-row"><div class="label" style="background:#ffdf7f">B</div><div class="drop-zone"></div></div>
            <div class="tier-row"><div class="label" style="background:#ffff7f">C</div><div class="drop-zone"></div></div>
            <div class="tier-row"><div class="label" style="background:#bfff7f">D</div><div class="drop-zone"></div></div>
            <div class="tier-row"><div class="label" style="background:#7fbfff">F</div><div class="drop-zone"></div></div>
        </div>

        <h3>Inventory</h3>
        <div id="holding-area" class="drop-zone"></div>
    </div>

    <script>
        // 1. Auto-scroll logic
        window.addEventListener('dragover', (e) => {
            const threshold = 50;
            if (e.clientY < threshold) window.scrollBy(0, -10);
            else if (window.innerHeight - e.clientY < threshold) window.scrollBy(0, 10);
        });

        // 2. Global Drop Handler (For dragging images from OTHER tabs/desktops)
        document.addEventListener('drop', (e) => {
            // If dropping on a drop-zone, let the specific zone handle it
            if (e.target.classList.contains('drop-zone')) return; 

            e.preventDefault();
            const holdingArea = document.getElementById('holding-area');

            // Handle Files (from desktop)
            if (e.dataTransfer.files.length > 0) {
                for (let file of e.dataTransfer.files) {
                    const reader = new FileReader();
                    reader.onload = (event) => holdingArea.appendChild(createImageElement(event.target.result));
                    reader.readAsDataURL(file);
                }
            } 
            // Handle URL/Image from other tabs
            else {
                const url = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
                if (url && (url.startsWith('http'))) {
                    holdingArea.appendChild(createImageElement(url));
                }
            }
        });

        document.addEventListener('dragover', (e) => e.preventDefault());

        // 3. Tier Zone Setup
        function setupDropZone(el) {
            el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
            el.addEventListener('dragleave', e => el.classList.remove('drag-over'));
            el.addEventListener('drop', e => {
                e.preventDefault();
                el.classList.remove('drag-over');
                const id = e.dataTransfer.getData("text");
                const draggableElement = document.getElementById(id);
                if (draggableElement) el.appendChild(draggableElement);
            });
        }
        document.querySelectorAll('.drop-zone').forEach(setupDropZone);

        // 4. Utilities
        function addTier() {
            const name = prompt("Enter Tier Name:");
            if (!name) return;
            const colors = ['#ff7f7f', '#ffbf7f', '#ffdf7f', '#ffff7f', '#bfff7f', '#7fbfff', '#ff7fff', '#7fffff'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const row = document.createElement('div');
            row.className = 'tier-row';
            row.innerHTML = `<div class="label" style="background:${randomColor}">${name}</div><div class="drop-zone"></div>`;
            document.getElementById('tier-list-container').appendChild(row);
            setupDropZone(row.querySelector('.drop-zone'));
        }

        function resetBoard() {
            if(!confirm("Move all items back to inventory?")) return;
            const holdingArea = document.getElementById('holding-area');
            document.querySelectorAll('.tier-row .drop-zone .image-wrapper').forEach(img => holdingArea.appendChild(img));
        }

        function createImageElement(src) {
            const wrapper = document.createElement('div');
            wrapper.className = 'image-wrapper';
            wrapper.draggable = true;
            wrapper.id = 'img-' + Date.now() + Math.random();
            wrapper.addEventListener('dragstart', e => e.dataTransfer.setData("text", e.target.id));

            const img = document.createElement('img');
            img.src = src;

            const delBtn = document.createElement('div');
            delBtn.innerHTML = '×';
            delBtn.className = 'delete-btn';
            delBtn.onclick = () => wrapper.remove();

            wrapper.appendChild(img);
            wrapper.appendChild(delBtn);
            return wrapper;
        }

        // 5. Input Listeners
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const holdingArea = document.getElementById('holding-area');
            for (let file of e.target.files) {
                const reader = new FileReader();
                reader.onload = (event) => holdingArea.appendChild(createImageElement(event.target.result));
                reader.readAsDataURL(file);
            }
        });

        document.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.startsWith('image')) {
                    const reader = new FileReader();
                    reader.onload = (event) => document.getElementById('holding-area').appendChild(createImageElement(event.target.result));
                    reader.readAsDataURL(item.getAsFile());
                }
            }
        });

        // 6. Save (with CORS support)
        document.getElementById('saveBtn').addEventListener('click', () => {
            html2canvas(document.getElementById('tier-list-container'), { useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'tea-err-list.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        });
    </script>
</body>
</html>
